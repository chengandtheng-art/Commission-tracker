<title>Commission Tracker — Refine Solutions</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f1;font-size:13px;}

/* LOGIN */
.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#0f3460 100%);}
.login-card{background:white;border-radius:20px;padding:48px 40px;text-align:center;box-shadow:0 24px 64px rgba(0,0,0,.3);width:320px;}
.brand-dot{width:48px;height:48px;background:linear-gradient(135deg,#c9a96e,#e8c87a);border-radius:12px;margin:0 auto 20px;}
.login-card h1{font-size:22px;font-weight:700;color:#1a1a2e;margin-bottom:4px;}
.sub{color:#888;font-size:13px;margin-bottom:32px;}
.role-btns{display:flex;flex-direction:column;gap:12px;}
.role-btn{padding:14px 20px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:10px;justify-content:center;transition:transform .15s,box-shadow .15s;}
.role-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.15);}
.staff-btn{background:#1a1a2e;color:white;}
.manager-btn{background:linear-gradient(135deg,#c9a96e,#e8c87a);color:#1a1a2e;}

/* APP */
.app{min-height:100vh;background:#f5f4f1;}
.header{background:#1a1a2e;padding:14px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10;}
.header-left{display:flex;align-items:center;gap:12px;}
.brand-sm{width:32px;height:32px;background:linear-gradient(135deg,#c9a96e,#e8c87a);border-radius:8px;}
.header-title{color:white;font-weight:700;font-size:15px;}
.header-role{color:#c9a96e;font-size:11px;}
.header-right{display:flex;align-items:center;gap:8px;}
.switch-btn{background:rgba(255,255,255,.1);color:white;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;}
.flag-filter-btn{background:#e65100;color:white;border:none;padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;}
.flag-filter-btn.active{background:#bf360c;}

.content{padding:20px;max-width:1600px;margin:0 auto;}

/* CARDS */
.summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:14px;}
@media(max-width:800px){.summary-grid{grid-template-columns:repeat(2,1fr);}}
.card{background:white;border-radius:14px;padding:18px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.accent-card{background:linear-gradient(135deg,#1a1a2e,#0f3460);}
.card-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#888;margin-bottom:6px;font-weight:600;}
.card-value{font-size:17px;font-weight:700;color:#1a1a2e;}
.accent-card .card-label{color:#c9a96e;}
.accent-card .card-value{color:white;font-size:20px;}

/* BREAKDOWN */
.breakdown-bar{background:white;border-radius:12px;padding:12px 18px;display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.06);}
.bi{font-size:12px;color:#444;}.bl{font-weight:700;color:#1a1a2e;margin-right:3px;}.sep{color:#c9a96e;font-weight:700;font-size:15px;}

/* TABLE HEADER */
.tbl-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.tbl-title{font-size:15px;font-weight:700;color:#1a1a2e;}
.add-btn{background:#c9a96e;color:#1a1a2e;border:none;padding:7px 14px;border-radius:8px;font-weight:600;cursor:pointer;font-size:12px;}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.06);}
table{width:100%;border-collapse:collapse;background:white;font-size:12px;}
thead th{background:#1a1a2e;color:#c9a96e;padding:9px 10px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;}
tbody td{padding:8px 10px;border-bottom:1px solid #f0f0f0;color:#333;vertical-align:middle;}
tbody tr:hover td{background:#fafaf8;}
.num{text-align:right;font-variant-numeric:tabular-nums;}
.total-col{font-weight:700;color:#1a1a2e;}
.code-cell{font-family:monospace;font-size:11px;color:#666;}
.prog-cell{max-width:200px;}
.remark-cell{color:#888;font-size:11px;}
.idx-cell{color:#aaa;font-size:11px;width:36px;}
.flagged-row td{background:#fff8e1!important;}
.editing-row td{background:#f0f7ff!important;}

tfoot td{background:#1a1a2e;color:#c9a96e;font-weight:700;padding:9px 10px;font-size:12px;}
.totals-label{text-align:right;text-transform:uppercase;font-size:10px;letter-spacing:.08em;}

/* ACTIONS */
.action-cell{white-space:nowrap;}
.action-cell button{border:none;border-radius:6px;cursor:pointer;padding:3px 7px;font-size:12px;margin-right:2px;}
.btn-edit{background:#e8f4fd;}
.btn-flag{background:#fff3e0;}
.btn-del{background:#fdecea;}
.btn-unflag{background:#e8f5e9;}
.btn-save{background:#1a1a2e;color:white;font-weight:600;}
.btn-cancel{background:#eee;}
.pending-badge{font-size:10px;color:#e65100;background:#fff3e0;padding:2px 6px;border-radius:4px;}
.flag-badge{margin-left:3px;font-size:10px;}

/* INPUTS */
input[type=text],input[type=number]{border:1.5px solid #c9a96e;border-radius:6px;padding:3px 6px;font-size:11px;width:100%;min-width:55px;background:white;}

/* FLAG NOTES */
.flag-panel{margin-top:18px;background:#fff8e1;border:2px solid #ff9800;border-radius:14px;padding:18px;}
.flag-panel h3{font-size:14px;margin-bottom:12px;color:#e65100;}
.flag-note-item{background:white;border-radius:8px;padding:10px;margin-bottom:8px;line-height:1.6;}
.flag-note-text{color:#555;font-style:italic;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;}
.modal{background:white;border-radius:16px;padding:26px;width:360px;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal h3{font-size:16px;margin-bottom:8px;color:#1a1a2e;}
.modal p{font-size:12px;color:#666;margin-bottom:12px;}
textarea.flag-ta{width:100%;border:1.5px solid #ddd;border-radius:8px;padding:10px;font-size:12px;resize:vertical;font-family:inherit;margin-bottom:14px;}
textarea.flag-ta:focus{outline:none;border-color:#c9a96e;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;}
.modal-actions button{border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:12px;}
.btn-mcancel{background:#eee;}
.btn-msubmit{background:#1a1a2e;color:white;font-weight:600;}
</style>

const BASIC = 1700;

function calcServiceComm(t){
  if(t<=0) return 0;
  if(t<2500) return t*0.03;
  const first=Math.min(t,4000)*0.04;
  return t>4000 ? first+(t-4000)*0.05 : first;
}
function calcProductComm(p){
  if(p<=0) return 0;
  if(p<6000) return p*0.05;
  if(p<8000) return p*0.06;
  if(p<12000) return p*0.065;
  return p*0.07;
}
function fmt(n){return 'RM '+Number(n).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});}
function dash(n){return n>0?Number(n).toFixed(2):'—';}

  nextId:INITIAL_ROWS.length+1
};

function getTotals(){
  const trt=state.rows.reduce((s,r)=>s+r.facial+r.body+r.hair+r.hifu,0);
  const prod=state.rows.reduce((s,r)=>s+r.product,0);
  return{
    trt,prod,
    sales:trt+prod,
    svc:calcServiceComm(trt),
    prd:calcProductComm(prod),
    total:BASIC+calcServiceComm(trt)+calcProductComm(prod)
  };
}

        <span class="bi"><span class="bl">Service Comm</span>RM ${t.svc.toFixed(2)}</span>
        <span class="sep">+</span>
        <span class="bi"><span class="bl">Product Comm</span>RM ${t.prd.toFixed(2)}</span>
      </div>
      <div class="tbl-hdr">

            <th class="num">Hifu</th><th class="num">Product</th><th class="num">Total</th>
            <th>Actions</th>
          </tr></thead>
          <tbody>${display.map((r,i)=>renderRow(r,i+1)).join('')}</tbody>
          ${!state.showFlagged?`<tfoot><tr>
            <td colspan="9" class="totals-label">TOTALS</td>
            <td class="num">${state.rows.reduce((s,r)=>s+r.facial,0).toFixed(2)}</td>
            <td class="num">${state.rows.reduce((s,r)=>s+r.body,0).toFixed(2)}</td>
            <td class="num">${state.rows.reduce((s,r)=>s+r.hair,0).toFixed(2)}</td>
            <td class="num">${state.rows.reduce((s,r)=>s+r.hifu,0).toFixed(2)}</td>

      <div class="brand-dot"></div>
      <h1>Commission Portal</h1>
      <p class="sub">Refine Solutions · MAY 2026</p>
      <div class="role-btns">
        <button class="role-btn staff-btn" onclick="setRole('staff')">👤 Staff View</button>
        <button class="role-btn manager-btn" onclick="setRole('manager')">🔑 Manager View</button>
      </div>
    </div>
  </div>`;}

function renderRow(r,i){
  const tot=r.facial+r.body+r.hair+r.hifu+r.product;
  const isE=state.editingId===r.id;
  if(isE){
    const b=state.editBuf;
    return `<tr class="editing-row">
      <td class="idx-cell">${i}</td>
      <td><input type="text" value="${b.date||''}" oninput="eb('date',this.value)" style="min-width:90px"></td>
      <td><input type="text" value="${b.time||''}" oninput="eb('time',this.value)" style="min-width:70px"></td>
      <td><input type="text" value="${b.code||''}" oninput="eb('code',this.value)" style="min-width:80px"></td>
      <td><input type="text" value="${b.client||''}" oninput="eb('client',this.value)" style="min-width:100px"></td>
      <td><input type="text" value="${b.programme||''}" oninput="eb('programme',this.value)" style="min-width:140px"></td>
      <td><input type="number" value="${b.mins||0}" oninput="ebn('mins',this.value)" style="min-width:40px"></td>
      <td><input type="text" value="${b.remark||''}" oninput="eb('remark',this.value)" style="min-width:60px"></td>
      <td><input type="text" value="${b.cashNo||''}" oninput="eb('cashNo',this.value)" style="min-width:70px"></td>
      <td><input type="number" value="${b.facial||0}" oninput="ebn('facial',this.value)" style="min-width:60px"></td>
      <td><input type="number" value="${b.body||0}" oninput="ebn('body',this.value)" style="min-width:60px"></td>
      <td><input type="number" value="${b.hair||0}" oninput="ebn('hair',this.value)" style="min-width:60px"></td>
      <td><input type="number" value="${b.hifu||0}" oninput="ebn('hifu',this.value)" style="min-width:60px"></td>
      <td><input type="number" value="${b.product||0}" oninput="ebn('product',this.value)" style="min-width:60px"></td>
      <td class="num total-col">—</td>
      <td class="action-cell">
        <button class="btn-save" onclick="saveEdit()">Save</button>
        <button class="btn-cancel" onclick="cancelEdit()">Cancel</button>
      </td>
    </tr>`;
  }
  return `<tr class="${r.flagged?'flagged-row':''}">
    <td class="idx-cell">${i}${r.flagged?'<span class="flag-badge">🚩</span>':''}</td>
    <td>${r.date}</td><td>${r.time}</td>
    <td class="code-cell">${r.code}</td>
    <td>${r.client}</td>
    <td class="prog-cell">${r.programme}</td>
    <td class="num">${r.mins}</td>
    <td class="remark-cell">${r.remark}</td>
    <td>${r.cashNo}</td>
    <td class="num">${dash(r.facial)}</td>
    <td class="num">${dash(r.body)}</td>
    <td class="num">${dash(r.hair)}</td>
    <td class="num">${dash(r.hifu)}</td>
    <td class="num">${dash(r.product)}</td>
    <td class="num total-col">${tot.toFixed(2)}</td>
    <td class="action-cell">
      <button class="btn-edit" onclick="startEdit(${r.id})" title="Edit">✏️</button>
      ${!r.flagged?`<button class="btn-flag" onclick="openFlag(${r.id})" title="Flag for manager">🚩</button>`:''}
      ${r.flagged&&state.role==='manager'?`<button class="btn-unflag" onclick="unflag(${r.id})" title="Resolve">✅</button>`:''}
      ${r.flagged&&state.role==='staff'?`<span class="pending-badge">Pending review</span>`:''}
      <button class="btn-del" onclick="delRow(${r.id})" title="Delete">🗑️</button>
    </td>
  </tr>`;
}

function renderFlagPanel(){
  const flagged=state.rows.filter(r=>r.flagged);
  return `<div class="flag-panel">
    <h3>🚩 Staff Flag Notes</h3>
    ${flagged.map(r=>`<div class="flag-note-item">
      <strong>${r.client}</strong> — ${r.date} ${r.time}<br>
      <span class="flag-note-text">${r.flagNote||'No note provided'}</span>
    </div>`).join('')}
  </div>`;}

function renderFlagModal(){return `
  <div class="modal-overlay" onclick="closeFlag()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>🚩 Flag for Manager Review</h3>
      <p>Describe what needs to be checked:</p>
      <textarea class="flag-ta" rows="4" id="flagNoteInput" placeholder="e.g. Sales amount looks wrong, please verify...">${state.flagNote}</textarea>
      <div class="modal-actions">
        <button class="btn-mcancel" onclick="closeFlag()">Cancel</button>
        <button class="btn-msubmit" onclick="submitFlag()">Send Flag</button>
      </div>
    </div>
  </div>`;}

// Actions
function setRole(r){state.role=r;render();}
function switchRole(){state.role=null;state.showFlagged=false;render();}
function toggleFlagged(){state.showFlagged=!state.showFlagged;render();}

function startEdit(id){
  state.editingId=id;
  state.editBuf={...state.rows.find(r=>r.id===id)};
  render();
}
function eb(f,v){state.editBuf[f]=v;}
function ebn(f,v){state.editBuf[f]=parseFloat(v)||0;}
function saveEdit(){
  state.rows=state.rows.map(r=>r.id===state.editingId?{...state.editBuf,id:r.id}:r);
  state.editingId=null;state.editBuf={};render();
}
function cancelEdit(){state.editingId=null;state.editBuf={};render();}

function addRow(){
  const newRow={id:state.nextId++,date:'',time:'',code:'',client:'',programme:'',mins:0,remark:'',cashNo:'',facial:0,body:0,hair:0,hifu:0,product:0,flagged:false,flagNote:''};
  state.rows.push(newRow);
  state.editingId=newRow.id;
  state.editBuf={...newRow};
  render();
}
function delRow(id){
  if(confirm('Delete this record?')){state.rows=state.rows.filter(r=>r.id!==id);render();}
}

function openFlag(id){state.flagModal=id;state.flagNote='';render();}
function closeFlag(){state.flagModal=null;state.flagNote='';render();}
function submitFlag(){
  const note=document.getElementById('flagNoteInput')?.value||'';
  state.rows=state.rows.map(r=>r.id===state.flagModal?{...r,flagged:true,flagNote:note}:r);
  state.flagModal=null;state.flagNote='';render();
}
function unflag(id){
  state.rows=state.rows.map(r=>r.id===id?{...r,flagged:false,flagNote:''}:r);render();
}

render();
</script>
</body>
</html>
